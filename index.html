<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 封面设计助手 - 小红书视频封面生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#D4A574;--primary-dark:#B8956A;--primary-light:#F5E6D3;
  --accent:#E8B4A8;--accent-light:#F5D5CC;
  --text-dark:#5A4A42;--text-light:#8B7B73;--text-lighter:#C4B4AC;
  --bg-light:#F9F6F2;--bg-white:#FFFBF7;--bg-gray:#F5EFE8;
  --border:#E8DDD0;--shadow:0 3px 12px rgba(90,74,66,.08);
  --shadow-lg:0 8px 24px rgba(90,74,66,.12);
  --font:'Segoe UI','PingFang SC','Microsoft YaHei','Courier New',sans-serif;
}
html,body{height:100%;width:100%}
body{background:linear-gradient(135deg,#F9F6F2 0%,#FBF8F4 100%);font-family:var(--font);color:var(--text-dark);background-attachment:fixed}
.container{max-width:1000px;margin:0 auto;padding:40px 20px}
.header{text-align:center;margin-bottom:40px}
.header h1{font-size:32px;font-weight:700;margin-bottom:10px;color:var(--text-dark)}
.header p{font-size:16px;color:var(--text-light);line-height:1.6}
.card{background:var(--bg-white);border:2px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:24px;transform:rotate(-0.5deg);position:relative;margin-bottom:20px}
.card::before{content:'';position:absolute;top:-6px;right:12px;width:10px;height:10px;background:var(--primary);border-radius:50%;opacity:.4;z-index:1}
.card::after{content:'';position:absolute;bottom:-4px;left:16px;width:8px;height:8px;background:var(--accent);border-radius:50%;opacity:.3;z-index:1}
.card h2{font-size:20px;font-weight:700;margin-bottom:16px;color:var(--text-dark)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-light);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-textarea{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14px;color:var(--text-dark);transition:all .3s}
.form-input:focus,.form-textarea:focus{border-color:var(--primary);background:var(--primary-light);outline:none}
.form-textarea{resize:vertical;min-height:100px}
.btn{width:100%;height:50px;border:2px solid transparent;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .3s;font-family:var(--font);box-shadow:var(--shadow);position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:50%;left:-100%;width:2px;height:60%;background:rgba(255,255,255,.2);transform:translateY(-50%);transition:left .3s}
.btn:hover::before{left:110%}
.btn:active:not(:disabled){transform:scale(.96)}
.btn-primary{background:var(--primary);color:var(--bg-white);border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.result-box{background:linear-gradient(135deg,var(--primary-light) 0%,var(--accent-light) 100%);border:2px solid var(--primary);border-radius:12px;padding:20px;margin-top:20px;transform:rotate(-0.5deg);position:relative;overflow:hidden}
.result-box::before{content:'';position:absolute;top:50%;right:12px;width:3px;height:3px;background:var(--primary);border-radius:50%;opacity:.4;box-shadow:0 8px 0 var(--primary),0 16px 0 var(--primary)}
.result-box::after{content:'';position:absolute;bottom:8px;left:12px;width:2px;height:2px;background:var(--accent);border-radius:50%;opacity:.3;box-shadow:6px 0 0 var(--accent),12px 0 0 var(--accent)}
.result-title{font-size:14px;font-weight:700;color:var(--primary-dark);margin-bottom:12px}
.result-content{font-size:13px;color:var(--text-dark);line-height:1.8;white-space:pre-wrap;word-break:break-word}
.error-box{background:#FFE8E8;border:2px solid #FF6B6B;border-radius:12px;padding:12px;margin-top:20px;color:#C92A2A;font-size:13px}
.loading{display:none;text-align:center;padding:20px}
.spinner{display:inline-block;width:40px;height:40px;border:3.5px solid var(--primary);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:10px;font-size:14px;color:var(--text-dark);font-weight:600}
.api-status{font-size:12px;color:var(--text-light);margin-top:8px;padding:8px;background:var(--bg-gray);border-radius:8px;text-align:center}
.api-status.success{color:var(--primary-dark);background:var(--primary-light)}
.api-status.error{color:#C92A2A;background:#FFE8E8}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text-dark);color:var(--bg-white);padding:14px 24px;border-radius:10px;box-shadow:var(--shadow-lg);font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;pointer-events:auto}
@media(max-width:768px){
  .header h1{font-size:24px}
  .container{padding:20px 16px}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎨 AI 封面设计助手</h1>
    <p>用 AI 帮你设计小红书视频封面<br/>温暖、拼贴、手绘风格</p>
  </div>

  <div class="card">
    <h2>⚙️ API 设置</h2>
    <div class="form-group">
      <label class="form-label">Claude API Key</label>
      <input type="password" id="apiKey" class="form-input" placeholder="输入你的 Claude API Key">
      <div class="api-status" id="apiStatus"></div>
    </div>
    <button class="btn btn-primary" onclick="saveApiKey()">✓ 保存 API Key</button>
  </div>

  <div class="card">
    <h2>✨ 生成设计</h2>
    <div class="form-group">
      <label class="form-label">描述你的视频</label>
      <textarea class="form-textarea" id="videoDesc" placeholder="例如：一个关于手工皂制作的视频，温暖、手绘风格、拼贴感..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">风格偏好</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div style="padding:6px 12px;background:var(--primary-light);border:2px solid var(--primary);border-radius:10px;font-size:12px;color:var(--primary-dark);font-weight:600">
          拼贴手帐
        </div>
        <div style="padding:6px 12px;background:var(--bg-gray);border:2px solid var(--border);border-radius:10px;font-size:12px;color:var(--text-dark);font-weight:600">
          温暖色系
        </div>
        <div style="padding:6px 12px;background:var(--bg-gray);border:2px solid var(--border);border-radius:10px;font-size:12px;color:var(--text-dark);font-weight:600">
          手绘元素
        </div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="generateDesign()">✨ 用 AI 生成设计方案</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">AI 正在思考...</div>
    </div>

    <div id="resultContainer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Toast 提示 =====
function showToast(msg, duration = 2000) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

// ===== API Key 管理 =====
function saveApiKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) {
    showToast('请输入 API Key');
    return;
  }
  localStorage.setItem('claudeApiKey', key);
  updateApiStatus('✓ API Key 已保存！', 'success');
  showToast('API Key 已保存');
}

function getApiKey() {
  return localStorage.getItem('claudeApiKey');
}

function updateApiStatus(msg, type = '') {
  const status = document.getElementById('apiStatus');
  status.textContent = msg;
  status.className = 'api-status ' + type;
}

// ===== AI 生成设计 =====
async function generateDesign() {
  const apiKey = getApiKey();
  if (!apiKey) {
    showToast('请先设置 API Key');
    updateApiStatus('❌ 请先设置 API Key', 'error');
    return;
  }

  const videoDesc = document.getElementById('videoDesc').value.trim();
  if (!videoDesc) {
    showToast('请描述你的视频内容');
    return;
  }

  // 显示加载
  document.getElementById('loading').style.display = 'block';
  document.getElementById('resultContainer').innerHTML = '';

  try {
    // 使用 encodeURIComponent 处理中文字符
    const prompt = encodeURIComponent(`You are a professional Xiaohongshu video cover designer. The user wants to create a video cover. Please provide a detailed design plan based on the following description:

Video content: ${videoDesc}

Please provide:
1. [Cover Theme] - Core visual elements
2. [Color Scheme] - Specific color combinations (using warm brown, pink, cream white in collage scrapbook style)
3. [Layout Suggestions] - How to arrange elements
4. [Text Suggestions] - Title and subtitle content and position
5. [Decorative Elements] - Hand-drawn lines, decorative dots and other details
6. [Design Rationale] - Why design this way

Please use concise and practical language so users can directly use it for design.`);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: `You are a professional Xiaohongshu video cover designer. The user wants to create a video cover. Please provide a detailed design plan based on the following description:

Video content: ${videoDesc}

Please provide:
1. [Cover Theme] - Core visual elements
2. [Color Scheme] - Specific color combinations (using warm brown, pink, cream white in collage scrapbook style)
3. [Layout Suggestions] - How to arrange elements
4. [Text Suggestions] - Title and subtitle content and position
5. [Decorative Elements] - Hand-drawn lines, decorative dots and other details
6. [Design Rationale] - Why design this way

Please use concise and practical language so users can directly use it for design.`
        }]
      })
    });

    document.getElementById('loading').style.display = 'none';

    if (!response.ok) {
      const error = await response.json();
      const errorMsg = error.error?.message || 'Request failed';
      throw new Error(errorMsg);
    }

    const data = await response.json();
    const design = data.content[0].text;

    displayDesignResult(design);
    showToast('✓ Design plan generated!');

  } catch (error) {
    document.getElementById('loading').style.display = 'none';
    
    let errorMsg = error.message;
    if (error.message.includes('Failed to fetch')) {
      errorMsg = 'Network error, please check your connection';
    } else if (error.message.includes('401')) {
      errorMsg = 'Invalid or expired API Key';
    }
    
    showToast('Error: ' + errorMsg);
    displayError(errorMsg);
  }
}

function displayDesignResult(design) {
  const resultHtml = `
    <div class="result-box">
      <div class="result-title">✨ AI Design Plan</div>
      <div class="result-content">${design}</div>
    </div>
  `;
  document.getElementById('resultContainer').innerHTML = resultHtml;
}

function displayError(error) {
  const errorHtml = `<div class="error-box">Error: ${error}</div>`;
  document.getElementById('resultContainer').innerHTML = errorHtml;
}

// ===== Initialize =====
window.addEventListener('load', () => {
  const savedKey = getApiKey();
  if (savedKey) {
    document.getElementById('apiKey').value = savedKey;
    updateApiStatus('✓ Loaded saved API Key', 'success');
  }
});
</script>
</body>
</html>
